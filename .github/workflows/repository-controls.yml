name: Repository controls

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Validate baseline documentation
        run: python3 tools/check_repository.py
      - name: Check whitespace
        run: git diff --check HEAD^ HEAD
