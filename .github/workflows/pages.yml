name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Inject analytics bootstrap
        run: |
          python3 - <<'PY'
          from pathlib import Path

          script = '  <script src="../assets/analytics.js"></script>\n'
          for path in (Path("site/en/index.html"), Path("site/pl/index.html")):
              content = path.read_text(encoding="utf-8")
              if "../assets/analytics.js" in content:
                  continue
              if "</body>" not in content:
                  raise SystemExit(f"Missing </body> marker in {path}")
              path.write_text(content.replace("</body>", f"{script}</body>"), encoding="utf-8")
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
